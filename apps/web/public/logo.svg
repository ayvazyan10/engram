<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="80" height="80" rx="18" fill="#09090f"/>
  <circle cx="40" cy="40" r="32" fill="url(#glow)"/>
  <g transform="translate(40,40)">
    <!-- Connections -->
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#818cf8" stroke-width="1.2" opacity="0.45"/>
    <line x1="0" y1="0" x2="19" y2="11" stroke="#818cf8" stroke-width="1.2" opacity="0.45"/>
    <line x1="0" y1="0" x2="-19" y2="11" stroke="#818cf8" stroke-width="1.2" opacity="0.45"/>
    <line x1="0" y1="0" x2="-12" y2="-17" stroke="#a5b4fc" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="0" x2="12" y2="-17" stroke="#a5b4fc" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="22" stroke="#a5b4fc" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-22" x2="12" y2="-17" stroke="#6366f1" stroke-width="0.6" opacity="0.2"/>
    <line x1="0" y1="-22" x2="-12" y2="-17" stroke="#6366f1" stroke-width="0.6" opacity="0.2"/>
    <line x1="19" y1="11" x2="0" y2="22" stroke="#6366f1" stroke-width="0.6" opacity="0.2"/>
    <line x1="-19" y1="11" x2="0" y2="22" stroke="#6366f1" stroke-width="0.6" opacity="0.2"/>
    <!-- Central node -->
    <circle r="8" fill="url(#g)"/>
    <circle r="5" fill="#818cf8" opacity="0.3"/>
    <!-- Orbital nodes -->
    <circle cx="0" cy="-22" r="5" fill="#818cf8" opacity="0.9"/>
    <circle cx="19" cy="11" r="5" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="-19" cy="11" r="5" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="-12" cy="-17" r="3.5" fill="#c7d2fe" opacity="0.6"/>
    <circle cx="12" cy="-17" r="3.5" fill="#c7d2fe" opacity="0.6"/>
    <circle cx="0" cy="22" r="3.5" fill="#c7d2fe" opacity="0.6"/>
