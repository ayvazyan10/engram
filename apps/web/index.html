<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engram — AI Brain Visualization</title>
    <meta name="description" content="Universal AI Brain — visualize and interact with persistent memory" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #020817;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #334155; }
      @keyframes spin { to { transform: rotate(360deg); } }
      input::placeholder { color: #1e3a5f; }
      input:focus::placeholder { color: #2a4a7f; }
      button:active { transform: scale(0.95); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
