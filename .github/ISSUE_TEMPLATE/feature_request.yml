name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved, not just the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "New adapter / integration"
        - "Memory engine (core)"
        - "MCP tools"
        - "REST API"
        - "Dashboard / visualization"
        - "Performance"
        - "Documentation"
        - "Other"
    validations:
      required: true
